# =============================================================================
# nginx/attendance.conf
# =============================================================================
#
# Nginx reverse-proxy configuration for the Attendance Management Application.
#
# Install:
#   sudo cp nginx/attendance.conf /etc/nginx/sites-available/attendance
#   sudo ln -s /etc/nginx/sites-available/attendance /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS certificates are managed by Certbot (Let's Encrypt):
#   sudo certbot --nginx -d yourdomain.com
#   (Certbot rewrites the ssl_certificate paths automatically)
#
# Replace "yourdomain.com" with your actual domain throughout this file.
# =============================================================================


# ---------------------------------------------------------------------------
# Upstream — Node.js app managed by PM2
# ---------------------------------------------------------------------------
upstream attendance_app {
    server 127.0.0.1:3000;
    keepalive 64;
}


# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ---------------------------------------------------------------------------
# HTTPS — main server block
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yourdomain.com www.yourdomain.com;

    # ----- TLS -----
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ----- Gzip compression -----
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1000;
    gzip_types
        text/html
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        image/svg+xml;

    # ----- Upload limit (for any future file uploads) -----
    client_max_body_size 5m;

    # ----- Security headers -----
    # These mirror the headers set in next.config.ts.
    # Setting them at both layers (Nginx + Next.js) provides defence-in-depth.
    add_header X-Frame-Options            "DENY"                              always;
    add_header X-Content-Type-Options     "nosniff"                           always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(self), publickey-credentials-get=(self), publickey-credentials-create=(self)" always;
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;

    # ----- Proxy to Next.js -----
    location / {
        proxy_pass         http://attendance_app;
        proxy_http_version 1.1;

        # WebSocket support (required for Next.js HMR in dev, harmless in prod)
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";

        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        proxy_cache_bypass $http_upgrade;
        proxy_buffering    off;
    }

    # ----- Static assets: long cache TTL -----
    # Next.js hashes filenames, so these can be cached indefinitely.
    location /_next/static/ {
        proxy_pass http://attendance_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ----- Favicon -----
    location = /favicon.ico {
        proxy_pass http://attendance_app;
        access_log off;
        log_not_found off;
    }

    # ----- Logs -----
    access_log /var/log/nginx/attendance.access.log;
    error_log  /var/log/nginx/attendance.error.log warn;
}
